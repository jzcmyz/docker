########################### NETWORKS
networks:
  default:
    driver: bridge
  socket_proxy:
    name: socket_proxy
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.91.0/24

########################### SECRETS
secrets:
  plex_claim:
    file: $DOCKERDIR/secrets/plex_claim

include:
  ########################### SERVICES
  # HOSTNAME defined in .env file
  #
  - compose/$HOSTNAME/socket-proxy.yml
  - compose/$HOSTNAME/portainer.yml
  - compose/$HOSTNAME/homepage.yml
  - compose/$HOSTNAME/nfs.yml
  - compose/$HOSTNAME/plex.yml
  - compose/$HOSTNAME/sonarr.yml
  - compose/$HOSTNAME/sabnzdb.yml
  - compose/$HOSTNAME/radarr.yml
  - compose/$HOSTNAME/prowlarr.yml
  - compose/$HOSTNAME/tautulli.yml
  - compose/$HOSTNAME/overseerr.yml
  - compose/$HOSTNAME/profilarr.yml
  - compose/$HOSTNAME/nzbget.yml
  - compose/$HOSTNAME/netbootxyz.yml
  - compose/$HOSTNAME/portainer.yml

