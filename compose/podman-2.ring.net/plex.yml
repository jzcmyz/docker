services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    profiles: ["media", "plex", "all"]
    ports:
      - "32400:32400/tcp"
      - "3005:3005/tcp"
      - "8324:8324/tcp"
      - "32469:32469/tcp"
      - "1900:1900/udp" 
      - "32410:32410/udp"
      - "32412:32412/udp"
      - "32413:32413/udp"
      - "32414:32414/udp"
    volumes:
      - $DOCKERDIR/appdata/plex:/config
      - $DOWNLOADSDIR:/data/downloads
      - media_movies_ro:/media/movies
      - media_tvshows_ro:/media/tvshows
      - /dev/shm:/data/transcode
    devices:
      - /dev/dri:/dev/dri # For Intel QuickSync
    environment:
      PLEX_UID: ${PUID}
      PLEX_GID: ${PGID}
      TZ: ${TZ}
      HOSTNAME: ${PLEX_SERVER_NAME}
      PLEX_CLAIM: claim-y4M9u2G4SDyrqEJGSr9x  # Get a claim token from https://www.plex.tv/claim/ 

volumes:
  media_movies_ro:
    name: media_movies_ro
    driver: local
    driver_opts:
      type: "nfs"
      o: "nolock,soft,ro"
      device: "192.168.1.112:/mnt/datastore/media/Movies"

  media_tvshows_ro:
    name: media_tvshows_ro
    driver: local
    driver_opts:
      type: "nfs"
      o: "nolock,soft,ro"
      device: "192.168.1.112:/mnt/datastore/media/TV Shows"

  media_movies_rw:
    name: media_movies_rw
    driver: local
    driver_opts:
      type: "nfs"
      o: "nolock,soft,rw"
      device: "192.168.1.112:/mnt/datastore/media/Movies"

  media_tvshows_rw:
    name: media_tvshows_rw
    driver: local
    driver_opts:
      type: "nfs"
      o: "nolock,soft,rw"
      device: "192.168.1.112:/mnt/datastore/media/TV Shows"
