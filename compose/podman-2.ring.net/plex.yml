
services:
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    profiles: ["media", "all"]
    networks:
      - default
    ports:
      - "32400:32400/tcp"
      - "3005:3005/tcp"
      - "8324:8324/tcp"
      - "32469:32469/tcp"
      - "1900:1900/udp" 
      - "32410:32410/udp"
      - "32412:32412/udp"
      - "32413:32413/udp"
      - "32414:32414/udp"
    # DEVICES-GPU-PLACEHOLDER-DO-NOT-DELETE
    volumes:
      - $DOCKERDIR/appdata/plex:/config
      - $DOWNLOADSDIR:/data/downloads
      - media_movies_ro:/media/movies
      - media_tvshows_ro:/media/tvshows
      - /dev/shm:/data/transcode
    devices:
      - /dev/dri:/dev/dri # For Intel QuickSync
      # - /dev/nvidia0:/dev/nvidia0 # Uncomment for NVIDIA GPU support
      # - /dev/nvidiactl:/dev/nvidiactl # Uncomment for NVIDIA GPU support
      # - /dev/nvidia-uvm:/dev/nvidia-uvm # Uncomment for NVIDIA GPU support
    # Uncomment the following line if you want to use a Plex claim file
    # - /run/secrets/plex_claim:/run/secrets/plex_claim:ro:u

    environment:
      PLEX_UID: $PUID
      PLEX_GID: $PGID
      TZ: $TZ
      HOSTNAME: $PLEX_SERVER_NAME
      #PLEX_CLAIM: claim goes here 
      #PLEX_CLAIM_FILE: /run/secrets/plex_claim
      #ADVERTISE_IP: "http://$SERVER_LAN_IP:32400/,https://PLEX-SUBDOMAIN-PLACEHOLDER.$DOMAINNAME_1/"
    secrets:
      - plex_claim
    # DOCKER-LABELS-PLACEHOLDER